# Polaris — core services (backend + frontend)
#
# Run (foreground):    docker compose up --build
# Run (background):    docker compose up -d --build
# Stop:               docker compose down
#
# Frontend: http://localhost:5173   Backend API: http://localhost:3001
#
# For GPU-accelerated AI features (Whisper STT + Ollama LLM), use the overlay:
#   docker compose -f docker-compose.yml -f docker-compose.ai.yml up --build
# Requires: NVIDIA Container Toolkit — https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/

services:
  # ──────────────────────────────────────────────────────────
  # Backend (Node.js / Fastify)
  # ──────────────────────────────────────────────────────────
  backend:
    build: .
    command: >
      sh -c "cd apps/backend &&
        npx prisma migrate deploy &&
        npx prisma generate &&
        node dist/index.js"
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: file:./data/polaris.db
      # WHISPER_URL and OLLAMA_URL are intentionally omitted here.
      # Voice + AI features gracefully degrade to 503 when not configured.
      # Set them via docker-compose.ai.yml overlay to enable GPU AI services.
    volumes:
      - polaris_data:/app/apps/backend/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ──────────────────────────────────────────────────────────
  # Frontend (React / Vite)
  # ──────────────────────────────────────────────────────────
  frontend:
    build: .
    command: npm run dev --workspace=apps/frontend
    ports:
      - "5173:5173"
    environment:
      # Vite proxies /api and /health to the backend container
      VITE_PROXY_TARGET: http://backend:3001
    depends_on:
      backend:
        condition: service_healthy

volumes:
  polaris_data:

